<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fruit Catcher: Bomb Escape</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
    }

    canvas {
      background: #222;
      display: block;
      margin: 20px auto;
      border: 2px solid #555;
    }
  </style>
</head>
<body>

<h1>Fruit Catcher: Bomb Escape</h1>
<canvas id="gameCanvas" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const player = {
  x: 400,
  y: 250,
  size: 40,
  speed: 5
};

const keys = {};
document.addEventListener("keydown", function(e) {
  keys[e.key] = true;

  if (!gameStarted && e.code === "Space") {
  gameStarted = true;
}
  if (gameStarted && !gameOver && (e.key === "p" || e.key === "P") && !e.repeat) {
    if (paused) {
      paused = false;
      resumeCountdown = 180;
    } else if (resumeCountdown <= 0) {
      paused = true;
    }
  }
  if (gameOver && (e.key === "r" || e.key === "R")) {
    restartGame();
  }
});


document.addEventListener("keyup", function(e) {
  keys[e.key] = false;
});

let fruits = [];
let bombs = [];
let score = 0;
let highScore = Number(localStorage.getItem("fruitCatcherHighScore")) || 0;
let newHighScore = false;
let effects = [];
let particles = [];
let stars = [];
let goldenApples = [];
let goldenHearts = [];
let magnetPowerUps = [];
let lives = 3;
let bonusHeart = false;
let bonusHeartTimer = 0;
let difficultyLevel = 1;
let levelUpTimer = 0;
let levelUpText = "";
let gameOver = false;
let gameStarted = false;
let paused = false;
let resumeCountdown = 0;
let powerUps = [];
let slowMotion = false;
let slowTimer = 0;
let magnetActive = false;
let magnetTimer = 0;
let hazards = [];
let bombStorm = false;
let stormTimer = 0;
let shakeTimer = 0;

function randomPosition(size) {
  return {
    x: Math.random() * (canvas.width - size) + size / 2,
    y: Math.random() * (canvas.height - size) + size / 2
  };
}

function createFruit() {
  const pos = randomPosition(30);
  fruits.push({
    x: pos.x,
    y: pos.y,
    size: 30,
    baseX: pos.x,
    movePhase: Math.random() * Math.PI * 2,
    moveSpeed: 0.025 + Math.random() * 0.015,
    moveRange: 18 + Math.random() * 22
  });
}

function createGoldenApple() {
  const pos = randomPosition(34);
  goldenApples.push({
    x: pos.x,
    y: pos.y,
    size: 34,
    life: 300
  });
}

function createGoldenHeart() {
  const pos = randomPosition(34);
  goldenHearts.push({
    x: pos.x,
    y: pos.y,
    size: 34,
    life: 300
  });
}

function createMagnetPowerUp() {
  const pos = randomPosition(30);
  magnetPowerUps.push({
    x: pos.x,
    y: pos.y,
    size: 30,
    life: 360
  });
}

function createPowerUp() {
  const pos = randomPosition(30);
  powerUps.push({
    x: pos.x,
    y: pos.y,
    size: 30,
    life: 420
  });
}

function createHazard() {
  hazards.push({
    x: Math.random() * (canvas.width - 40) + 20,
    y: -40,
    size: 34,
    speed: 7 + difficultyLevel * 0.4
  });
}

function drawPowerUps() {
  ctx.font = "30px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  powerUps.forEach(p => {
    const fade = p.life < 120 ? 0.45 + Math.sin(p.life * 0.45) * 0.35 : 1;

    ctx.save();
    ctx.globalAlpha = fade;
    ctx.fillText("🍬", p.x, p.y);
    ctx.restore();
  });
}

function drawMagnetPowerUps() {
  ctx.font = "30px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  magnetPowerUps.forEach(m => {
    const fade = m.life < 100 ? 0.45 + Math.sin(m.life * 0.45) * 0.35 : 1;

    ctx.save();
    ctx.globalAlpha = fade;
    ctx.fillText("🧲", m.x, m.y);
    ctx.restore();
  });
}

function createBomb() {
  bombs.push({
    x: Math.random() * (canvas.width - 40) + 20,
    y: -Math.random() * 300,
    size: 30,
    speed: 2 + difficultyLevel * 0.5,
    storm: false
  });
}

function createStormBomb() {
  bombs.push({
    x: Math.random() * (canvas.width - 40) + 20,
    y: -Math.random() * 300,
    size: 30,
    speed: 5 + difficultyLevel * 0.4,
    storm: true,
    removeWhenOffscreen: false
  });
}

function isColliding(obj1, obj2) {
  const distanceX = Math.abs(obj1.x - obj2.x);
  const distanceY = Math.abs(obj1.y - obj2.y);
  const limit = (obj1.size + obj2.size) / 2 * 0.75;

  return distanceX < limit && distanceY < limit;
}

function keepPlayerInsideCanvas() {
  const half = player.size / 2;

  if (player.x < half) {
    player.x = half;
  }

  if (player.x > canvas.width - half) {
    player.x = canvas.width - half;
  }

  if (player.y < half) {
    player.y = half;
  }

  if (player.y > canvas.height - half) {
    player.y = canvas.height - half;
  }
}

function updateHighScore() {
  if (score > highScore) {
    highScore = score;
    newHighScore = true;
    localStorage.setItem("fruitCatcherHighScore", highScore);
  }
}

function createParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.2 + Math.random() * 3.2;

    particles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 2 + Math.random() * 3,
      life: 28 + Math.random() * 18,
      maxLife: 46,
      color: color
    });
  }
}

function pullCollectiblesWithMagnet(items) {
  items.forEach(item => {
    const dx = player.x - item.x;
    const dy = player.y - item.y;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance > 1 && distance < 260) {
      const pullSpeed = item.size > 32 ? 3 : 4;
      item.x += dx / distance * pullSpeed;
      item.y += dy / distance * pullSpeed;
      if (item.baseX !== undefined) {
        item.baseX += dx / distance * pullSpeed;
      }
    }
  });
}

function updateMovingFruits() {
  fruits.forEach(fruit => {
    fruit.movePhase += fruit.moveSpeed;
    fruit.x = fruit.baseX + Math.sin(fruit.movePhase) * fruit.moveRange;

    const half = fruit.size / 2;
    if (fruit.x < half) {
      fruit.x = half;
      fruit.baseX = half + fruit.moveRange;
    }
    if (fruit.x > canvas.width - half) {
      fruit.x = canvas.width - half;
      fruit.baseX = canvas.width - half - fruit.moveRange;
    }
  });
}

function update() {
  if (!gameStarted || gameOver) return;
  if (paused) return;

  if (resumeCountdown > 0) {
    resumeCountdown--;
    return;
  }

  updateHighScore();

  if (bonusHeart) {
    bonusHeartTimer--;

    if (bonusHeartTimer <= 0) {
      bonusHeart = false;
      bonusHeartTimer = 0;
    }
  }

  if (levelUpTimer > 0) {
    levelUpTimer--;
  }

  if (magnetActive) {
    magnetTimer--;
    pullCollectiblesWithMagnet(fruits);
    pullCollectiblesWithMagnet(goldenApples);

    if (magnetTimer <= 0) {
      magnetActive = false;
      magnetTimer = 0;
    }
  }

  if (keys["ArrowUp"]) player.y -= player.speed;
  if (keys["ArrowDown"]) player.y += player.speed;
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;

  updateMovingFruits();

  for (let i = powerUps.length - 1; i >= 0; i--) {
  powerUps[i].life--;

  if (powerUps[i].life <= 0) {
    powerUps.splice(i, 1);
    continue;
  }

  if (isColliding(player, powerUps[i])) {
    slowMotion = true;
    slowTimer = 180; // ~3 saniye
    createParticles(powerUps[i].x, powerUps[i].y, "#7df9ff", 16);

    powerUps.splice(i, 1);
  }
}
  for (let i = magnetPowerUps.length - 1; i >= 0; i--) {
  magnetPowerUps[i].life--;

  if (magnetPowerUps[i].life <= 0) {
    magnetPowerUps.splice(i, 1);
    continue;
  }

  if (isColliding(player, magnetPowerUps[i])) {
    magnetActive = true;
    magnetTimer = 420;
    createParticles(magnetPowerUps[i].x, magnetPowerUps[i].y, "#46dcff", 18);

    effects.push({
      x: magnetPowerUps[i].x,
      y: magnetPowerUps[i].y,
      text: "MAGNET!",
      life: 55,
      color: "cyan"
    });

    magnetPowerUps.splice(i, 1);
  }
}
if (slowMotion) {
  slowTimer--;

  bombs.forEach(b => {
    b.speed = 1;
  });

  if (slowTimer <= 0) {
    slowMotion = false;

    bombs.forEach(b => {
      b.speed = 2 + difficultyLevel * 0.5;
    });
  }
} 
if (Math.random() < 0.002 && powerUps.length < 2) {
  createPowerUp();
}
if (Math.random() < 0.00045 && goldenApples.length < 1) {
  createGoldenApple();
}
if (Math.random() < 0.0008 && magnetPowerUps.length < 1 && !magnetActive) {
  createMagnetPowerUp();
}
const heartChance = lives < 3 ? 0.00075 : 0.0002;
if (Math.random() < heartChance && goldenHearts.length < 1 && !bonusHeart) {
  createGoldenHeart();
}
keepPlayerInsideCanvas();

  if (Math.random() < 0.0015 && hazards.length < 1) {
    createHazard();
  }

  for (let i = hazards.length - 1; i >= 0; i--) {
    hazards[i].y += hazards[i].speed;

    if (hazards[i].y > canvas.height + hazards[i].size) {
      hazards.splice(i, 1);
      continue;
    }

    if (isColliding(player, hazards[i])) {
      bombStorm = true;
      stormTimer = 240;

      for (let j = 0; j < 8; j++) {
        createStormBomb();
      }

      effects.push({
        x: player.x,
        y: player.y,
        text: "BOMB STORM!",
        life: 70,
        color: "orange"
      });

      hazards.splice(i, 1);
    }
  }

  if (bombStorm) {
    stormTimer--;

    if (!slowMotion) {
      bombs.forEach(b => {
        b.speed = Math.max(b.speed, 5 + difficultyLevel * 0.4);
      });
    }

    if (stormTimer <= 0) {
      bombStorm = false;
      bombs.forEach(b => {
        if (b.storm) {
          b.removeWhenOffscreen = true;
          b.speed = 2 + difficultyLevel * 0.5;
        }
      });
    }
  }

  for (let i = fruits.length - 1; i >= 0; i--) {
	    if (isColliding(player, fruits[i])) {
  score += 10;
  createParticles(fruits[i].x, fruits[i].y, "#ffd84d", 14);

  effects.push({
    x: fruits[i].x,
    y: fruits[i].y,
    text: "+10",
    life: 40,
    color: "yellow"
  });

	  fruits.splice(i, 1);
	  createFruit();
	}
	  }

  for (let i = goldenApples.length - 1; i >= 0; i--) {
    goldenApples[i].life--;

    if (goldenApples[i].life <= 0) {
      goldenApples.splice(i, 1);
      continue;
    }

    if (isColliding(player, goldenApples[i])) {
      score += 50;
      createParticles(goldenApples[i].x, goldenApples[i].y, "#ffd700", 26);

      effects.push({
        x: goldenApples[i].x,
        y: goldenApples[i].y,
        text: "+50",
        life: 55,
        color: "gold"
      });

      goldenApples.splice(i, 1);
    }
	  }

	  for (let i = goldenHearts.length - 1; i >= 0; i--) {
    goldenHearts[i].life--;

    if (goldenHearts[i].life <= 0) {
      goldenHearts.splice(i, 1);
      continue;
    }

    if (isColliding(player, goldenHearts[i])) {
      createParticles(goldenHearts[i].x, goldenHearts[i].y, "#ffdd66", 22);

      if (lives < 3) {
        lives++;

        effects.push({
          x: goldenHearts[i].x,
          y: goldenHearts[i].y,
          text: "❤️ +1",
          life: 55,
          color: "pink"
        });
      } else {
        bonusHeart = true;
        bonusHeartTimer = 600;

        effects.push({
          x: goldenHearts[i].x,
          y: goldenHearts[i].y,
          text: "BONUS HEART!",
          life: 65,
          color: "gold"
        });
      }

      goldenHearts.splice(i, 1);
	    }
	  }

  updateHighScore();
	
for (let i = bombs.length - 1; i >= 0; i--) {
  bombs[i].y += bombs[i].speed;

  if (bombs[i].y > canvas.height + bombs[i].size) {
    if (bombs[i].removeWhenOffscreen) {
      bombs.splice(i, 1);
      continue;
    }

    bombs[i].x = Math.random() * (canvas.width - 40) + 20;
    bombs[i].y = -Math.random() * 300;
    bombs[i].speed = 2 + difficultyLevel * 0.5;
  }

  if (isColliding(player, bombs[i])) {
    const blockedByBonusHeart = bonusHeart;
    createParticles(bombs[i].x, bombs[i].y, blockedByBonusHeart ? "#ffd700" : "#ff3b3b", 22);

    if (bonusHeart) {
      bonusHeart = false;
      bonusHeartTimer = 0;
    } else {
      lives--;
    }
    shakeTimer = 12;

    effects.push({
   x: bombs[i].x,
   y: bombs[i].y,
   text: blockedByBonusHeart ? "💛 Shield" : "❤️ -1",
   life: 40,
   color: blockedByBonusHeart ? "gold" : "red"
});
    bombs[i].x = Math.random() * (canvas.width - 40) + 20;
    bombs[i].y = -Math.random() * 300;
    bombs[i].speed = 2 + difficultyLevel * 0.5;

    if (lives <= 0) {
      gameOver = true;
    }
  }
}
for (let i = effects.length - 1; i >= 0; i--) {
  effects[i].y -= 1;
  effects[i].life--;

  if (effects[i].life <= 0) {
    effects.splice(i, 1);
  }
} 
for (let i = particles.length - 1; i >= 0; i--) {
  particles[i].x += particles[i].vx;
  particles[i].y += particles[i].vy;
  particles[i].vy += 0.04;
  particles[i].vx *= 0.98;
  particles[i].life--;

  if (particles[i].life <= 0) {
    particles.splice(i, 1);
  }
}
for (let i = 0; i < stars.length; i++) {
  stars[i].y += stars[i].speed;

  if (stars[i].y > canvas.height) {
    stars[i].y = 0;
    stars[i].x = Math.random() * canvas.width;
  }
}
// difficulty increase
let newLevel = Math.floor(score / 50) + 1;

if (newLevel > difficultyLevel) {
  difficultyLevel = newLevel;
  levelUpText = "LEVEL " + difficultyLevel + "!";
  levelUpTimer = 90;
  createBomb();
}
}

function drawPlayer() {
  ctx.font = "40px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  if (gameOver) {
  ctx.fillText("💀", player.x, player.y);
} else {
  ctx.fillText("😎", player.x, player.y);
};
}

function drawFruits() {
  ctx.font = "32px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  fruits.forEach(function(fruit) {
    ctx.fillText("🍎", fruit.x, fruit.y);
  });
}

function drawGoldenAppleIcon(x, y, scale, life) {
  const pulse = Math.sin(life * 0.12) * 2;
  const radius = 14 + pulse;

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.rotate(Math.sin(life * 0.08) * 0.12);

  const gradient = ctx.createRadialGradient(-5, -6, 3, 0, 0, radius);
  gradient.addColorStop(0, "#fff8a8");
  gradient.addColorStop(0.45, "#ffd84d");
  gradient.addColorStop(1, "#d99a00");

  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(0, 3, radius, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#6ecb63";
  ctx.beginPath();
  ctx.ellipse(8, -13, 7, 4, -0.7, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "#7a4a00";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, -10);
  ctx.lineTo(3, -18);
  ctx.stroke();

  ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
  ctx.beginPath();
  ctx.arc(-5, -3, 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawGoldenApples() {
  goldenApples.forEach(function(apple) {
    drawGoldenAppleIcon(apple.x, apple.y, 1, apple.life);
  });
}

function drawGoldenHearts() {
  ctx.font = "34px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  goldenHearts.forEach(function(heart) {
    const pulse = Math.sin(heart.life * 0.14) * 3;
    const fade = heart.life < 90 ? 0.45 + Math.sin(heart.life * 0.5) * 0.35 : 1;

    ctx.save();
    ctx.globalAlpha = fade;
    ctx.translate(heart.x, heart.y);
    ctx.scale(1 + pulse * 0.01, 1 + pulse * 0.01);
    ctx.fillText("💛", 0, 0);
    ctx.restore();
  });
}

function drawBombs() {
  ctx.font = "32px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  bombs.forEach(function(bomb) {
    ctx.fillText("💣", bomb.x, bomb.y);
  });
}

function drawHazards() {
  ctx.font = "34px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  hazards.forEach(function(hazard) {
    ctx.fillText("☠️", hazard.x, hazard.y);
  });
}

function drawStars() {
  ctx.fillStyle = "white";

  stars.forEach(function(star) {
    ctx.fillRect(star.x, star.y, star.size, star.size);
  });
}

function drawEffects() {
  ctx.font = "22px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  effects.forEach(function(effect) {
    ctx.fillStyle = effect.color;
    ctx.fillText(effect.text, effect.x, effect.y);
  });
}

function drawParticles() {
  particles.forEach(function(particle) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, particle.life / particle.maxLife);
    ctx.fillStyle = particle.color;
    ctx.beginPath();
    ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawLevelUp() {
  if (levelUpTimer <= 0) return;

  const alpha = Math.min(1, levelUpTimer / 30);
  const scale = 1 + (90 - levelUpTimer) * 0.006;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(canvas.width / 2, canvas.height / 2 - 95);
  ctx.scale(scale, scale);
  ctx.fillStyle = "#ffd84d";
  ctx.strokeStyle = "rgba(0, 0, 0, 0.7)";
  ctx.lineWidth = 5;
  ctx.font = "44px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.strokeText(levelUpText, 0, 0);
  ctx.fillText(levelUpText, 0, 0);
  ctx.restore();
}

function drawStormAtmosphere() {
  if (!bombStorm) return;

  const pulse = 0.12 + Math.sin(stormTimer * 0.25) * 0.04;
  ctx.fillStyle = "rgba(255, 80, 0, " + pulse + ")";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "rgba(255, 150, 0, 0.8)";
  ctx.lineWidth = 6;
  ctx.strokeRect(3, 3, canvas.width - 6, canvas.height - 6);
}

function drawMagnetAura() {
  if (!magnetActive) return;

  const radius = 48 + Math.sin(magnetTimer * 0.15) * 5;
  const blink = magnetTimer < 120 ? 0.4 + Math.sin(magnetTimer * 0.45) * 0.3 : 1;
  ctx.strokeStyle = "rgba(70, 220, 255, " + 0.75 * blink + ")";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(player.x, player.y, radius, 0, Math.PI * 2);
  ctx.stroke();

  ctx.strokeStyle = "rgba(70, 220, 255, " + 0.25 * blink + ")";
  ctx.lineWidth = 10;
  ctx.beginPath();
  ctx.arc(player.x, player.y, radius + 8, 0, Math.PI * 2);
  ctx.stroke();
}

function drawUI() {
  ctx.fillStyle = "white";
  ctx.font = "24px Arial";
  ctx.textAlign = "left";
  ctx.textBaseline = "top";

  ctx.fillText("Score: " + score, 20, 20);
  ctx.fillText("High Score: " + highScore, 20, 115);
  ctx.fillText("Level: " + difficultyLevel, 20, 85);
  if (bombStorm) {
    ctx.fillStyle = "orange";
    ctx.fillText("Bomb Storm!", 20, 150);
  }
  if (magnetActive) {
    ctx.fillStyle = "cyan";
    ctx.fillText("Magnet!", 20, bombStorm ? 180 : 150);
  }
  for (let i = 0; i < lives; i++) {
  ctx.fillText("❤️", 20 + i * 30, 55);
};
  if (bonusHeart) {
    const blink = bonusHeartTimer < 150 ? 0.45 + Math.sin(bonusHeartTimer * 0.45) * 0.35 : 1;

    ctx.save();
    ctx.globalAlpha = blink;
    ctx.fillText("💛", 20 + lives * 30, 55);
    ctx.restore();
  }
}
function drawStartScreen() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.font = "48px Arial";
  ctx.fillText("Fruit Catcher", canvas.width / 2, 95);

  ctx.font = "28px Arial";
  ctx.fillText("Collect apples, dodge bombs, survive the storm", canvas.width / 2, 145);

  ctx.font = "24px Arial";
  ctx.fillText("Arrow Keys: Move     P: Pause", canvas.width / 2, 205);

  ctx.font = "24px Arial";
  ctx.fillStyle = "white";
  ctx.fillText("Press SPACE to Start", canvas.width / 2, 270);

  ctx.font = "17px Arial";
  ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
  ctx.fillText("High Score: " + highScore, canvas.width / 2, 310);

  ctx.font = "16px Arial";
  ctx.fillStyle = "rgba(255, 216, 77, 0.85)";
  ctx.textAlign = "left";
  ctx.fillText("🍎 +10", 120, 455);
  drawGoldenAppleIcon(225, 450, 0.55, 200);
  ctx.fillStyle = "rgba(255, 216, 77, 0.85)";
  ctx.fillText("+50", 245, 455);
  ctx.fillText("🍬 Slow", 315, 455);
  ctx.fillText("🧲 Magnet", 415, 455);
  ctx.fillText("💛 Shield", 540, 455);
  ctx.fillText("☠️ Storm", 660, 455);
}

function drawPauseScreen() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.font = "52px Arial";
  ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2 - 20);

  ctx.font = "24px Arial";
  ctx.fillText("Press P to Resume", canvas.width / 2, canvas.height / 2 + 35);
}

function drawResumeCountdown() {
  if (resumeCountdown <= 0) return;

  const count = Math.ceil(resumeCountdown / 60);
  const scale = 1 + (resumeCountdown % 60) / 180;

  ctx.fillStyle = "rgba(0, 0, 0, 0.35)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.scale(scale, scale);
  ctx.fillStyle = "white";
  ctx.strokeStyle = "rgba(0, 0, 0, 0.75)";
  ctx.lineWidth = 6;
  ctx.font = "76px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.strokeText(count, 0, 0);
  ctx.fillText(count, 0, 0);
  ctx.restore();

  ctx.font = "22px Arial";
  ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("Get ready", canvas.width / 2, canvas.height / 2 + 75);
}


function drawGameOver() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.font = "52px Arial";
  ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 40);

  ctx.font = "28px Arial";
  ctx.fillText("Final Score: " + score, canvas.width / 2, canvas.height / 2 + 10);

  if (newHighScore) {
    ctx.fillStyle = "gold";
    ctx.font = "26px Arial";
    ctx.fillText("NEW HIGH SCORE!", canvas.width / 2, canvas.height / 2 + 45);
  }

  ctx.font = "22px Arial";
  ctx.fillStyle = "white";
  ctx.fillText("Press R to Restart", canvas.width / 2, canvas.height / 2 + 85);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const shakeX = shakeTimer > 0 ? (Math.random() - 0.5) * 10 : 0;
  const shakeY = shakeTimer > 0 ? (Math.random() - 0.5) * 10 : 0;

  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawStars();
  drawStormAtmosphere();
  drawFruits();
  drawGoldenApples();
  drawGoldenHearts();
  drawMagnetPowerUps();
  drawBombs();
  drawHazards();
  drawMagnetAura();
  drawPlayer();
  drawParticles();
  drawEffects();
  drawLevelUp();
  drawUI();
  drawPowerUps();

if (!gameStarted) {
  drawStartScreen();
}
  if (gameOver) {
    drawGameOver();
  }
  if (paused && gameStarted && !gameOver) {
    drawPauseScreen();
  }
  if (resumeCountdown > 0 && gameStarted && !gameOver) {
    drawResumeCountdown();
  }

  ctx.restore();

  if (shakeTimer > 0) {
    shakeTimer--;
  }
}

function restartGame() {
  player.x = 400;
  player.y = 250;
  score = 0;
  newHighScore = false;
  lives = 3;
  gameOver = false;
  gameStarted = false;
  paused = false;
  resumeCountdown = 0;
  difficultyLevel = 1;
  levelUpTimer = 0;
  levelUpText = "";

  fruits = [];
  bombs = [];
  effects = [];
  particles = [];
  goldenApples = [];
  goldenHearts = [];
  magnetPowerUps = [];
  powerUps = [];
  hazards = [];
  bonusHeart = false;
  bonusHeartTimer = 0;
  magnetActive = false;
  magnetTimer = 0;
  slowMotion = false;
  slowTimer = 0;
  bombStorm = false;
  stormTimer = 0;
  shakeTimer = 0;
  
  stars = [];

  for (let i = 0; i < 50; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 1,
      speed: Math.random() * 2 + 0.5
    });
  }

  createFruit();
  createBomb();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

restartGame();
gameLoop();
</script>

</body>
</html>
